[project]
name = "opencloning-cli"
version = "0.1.0"
description = "Command-line tools for OpenCloning."
readme = "README.md"
license = "MIT"
authors = [
    { name = "Manuel Lera-Ramirez", email = "manulera14@gmail.com" },
]
requires-python = ">=3.11,<4"
dependencies = [
    "opencloning-db",
    "typer>=0.12.0",
]

[project.urls]
Repository = "https://github.com/manulera/OpenCloning_backend"

[project.scripts]
opencloning-cli = "opencloning_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opencloning_cli"]

[tool.uv.sources]
opencloning-db = { workspace = true }

[tool.black]
skip-string-normalization = true
line-length = 119

[tool.deptry]
known_first_party = ["opencloning_cli"]

[tool.hatch.metadata]
allow-direct-references = true
