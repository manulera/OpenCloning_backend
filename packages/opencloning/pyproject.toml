[project]
name = "opencloning"
dynamic = ["version"]
description = "Backend of OpenCloning, a web application to generate molecular cloning strategies in json format, and share them with others."
readme = "README.md"
license = "MIT"
authors = [
    { name = "Manuel Lera-Ramirez", email = "manulera14@gmail.com" },
]
requires-python = ">=3.11,<4"
dependencies = [
    "beautifulsoup4>=4.11.1,<5",
    "biopython>=1.87",
    "certifi>=2026.2.25",
    "fastapi>=0.135.3",
    "httpx>=0.28.1",
    "networkx>=3.6.1",
    "numpy>=2.4.4",
    "opencloning-linkml>=1.0.0",
    "python-multipart>=0.0.26",
    "uvicorn>=0.44.0",
    "pydantic>=2.7.1",
    "pydantic-core>=2.41.5",
    "pandas>=2.2.3,<3",
    "openpyxl>=3.1.5",
    "pyyaml>=6.0.2",
    "primer3-py>=2.3",
    "pairwise-alignments-to-msa>=0.1.1",
    "pydna @ git+https://github.com/pydna-group/pydna@cc529f19e297952dffd1af3129d6075fc5d26617",
]

[project.urls]
Repository = "https://github.com/manulera/OpenCloning_backend"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opencloning"]

[tool.hatch.version]
source = "vcs"

[tool.hatch.version.raw-options]
search_parent_directories = true

[tool.hatch.metadata]
allow-direct-references = true

[tool.deptry]
known_first_party = ["opencloning"]
per_rule_ignores = { DEP002 = ["python-multipart", "uvicorn", "openpyxl"] }
