[project]
name = "opencloning"
dynamic = ["version"]
description = "Backend of OpenCloning, a web application to generate molecular cloning strategies in json format, and share them with others."
readme = "README.md"
license = "MIT"
authors = [
    { name = "Manuel Lera-Ramirez", email = "manulera14@gmail.com" },
]
requires-python = ">=3.11,<4"
dependencies = [
    "beautifulsoup4>=4.11.1,<5",
    "fastapi",
    "httpx>=0.28.1",
    "python-multipart",
    "uvicorn",
    "regex>=2024.11.6",
    "pydantic>=2.7.1",
    "pandas>=2.2.3,<3",
    "openpyxl>=3.1.5",
    "pyyaml>=6.0.2",
    "primer3-py>=2.3",
    "packaging>=25.0",
    "pairwise-alignments-to-msa>=0.1.1",
    "pydna>=5.5.9",
]

[project.urls]
Repository = "https://github.com/manulera/OpenCloning_backend"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opencloning"]

[tool.hatch.version]
source = "vcs"

[tool.hatch.version.raw-options]
search_parent_directories = true
