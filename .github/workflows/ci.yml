name: CI / CD Pipeline
on: [push, pull_request]

# Avoid running multiple jobs for the same branch
# in case of updates.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Run tests with locked resolution and with a freshly resolved lockfile
        mode: [lock, fresh]
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install mafft
        run: |
          sudo apt-get install -y mafft
      - name: Download MARS executable
        run: |
          wget https://github.com/manulera/MARS/releases/download/v0.2/mars-Linux
          chmod +x mars-Linux
          sudo mv mars-Linux /usr/local/bin/mars
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.11.5
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Remove uv.lock (fresh resolution)
        if: ${{ matrix.mode == 'fresh' }}
        run: rm -f uv.lock
      - name: Lock dependencies
        if: ${{ matrix.mode == 'fresh' }}
        run: uv lock
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run tests
        env:
          PYTHONUNBUFFERED: "1"
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          ADDGENE_USERNAME: ${{ secrets.ADDGENE_USERNAME }}
          ADDGENE_PASSWORD: ${{ secrets.ADDGENE_PASSWORD }}
        run: |
          uv run pytest --tb=short -v --capture=no --cov=packages/opencloning/src --cov=packages/opencloning-db/src --cov-report term --cov-report xml:coverage.xml

      - name: Stop workflow if mode is fresh
        if: ${{ matrix.mode == 'fresh' }}
        run: exit 0

      - uses: actions/cache@v4
        if: ${{ matrix.mode == 'lock' }}
        id: cache-precommit
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-precommit-hooks-v2-${{ hashFiles('**/.pre-commit-config.yaml') }}

      - name: Installing pre-commit hooks (cached)
        if: ${{ matrix.mode == 'lock' && steps.cache-precommit.outputs.cache-hit != 'true' }}
        run: uv run pre-commit install --install-hooks

      - name: Run style checking via pre-commit
        if: ${{ matrix.mode == 'lock' }}
        run: uv run pre-commit run --all-files

      - name: 🔼 Upload coverage to Codecov
        if: ${{ matrix.mode == 'lock' }}
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: true
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  test_in_docker:
    name: Test in Docker
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/opencloning.Dockerfile
          target: builder-test
          tags: manulera/opencloningbackend:test

      - name: Run tests in container
        run: |
          docker run --rm \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=256M \
            -e NCBI_API_KEY="${{ secrets.NCBI_API_KEY }}" \
            -e ADDGENE_USERNAME="${{ secrets.ADDGENE_USERNAME }}" \
            -e ADDGENE_PASSWORD="${{ secrets.ADDGENE_PASSWORD }}" \
            -e TMPDIR="/tmp" \
            -v "${{ github.workspace }}/packages/opencloning/tests:/home/backend/packages/opencloning/tests" \
            -v "${{ github.workspace }}/packages/opencloning-db/tests:/home/backend/packages/opencloning-db/tests" \
            manulera/opencloningbackend:test \
            uv run pytest -vs

  # Update docker image when committing to master branch
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Get package version
        id: get-package-version
        run: |
          uv sync --frozen --package opencloning --no-default-groups --no-editable
          echo "package-version=$(uv run python -c 'import importlib.metadata as m; print(m.version("opencloning"))')" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38
        with:
          images: manulera/opencloningbackend

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/opencloning.Dockerfile
          push: true
          tags: manulera/opencloningbackend:latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: PACKAGE_VERSION=${{ steps.get-package-version.outputs.package-version }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: manulera/opencloningbackend:latest
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
